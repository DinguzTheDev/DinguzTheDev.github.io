<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>???</title>

<style>
  html, body {
    margin: 0;
    height: 100%;
    background: black;
    overflow: hidden;
  }

  video {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    background: black;
  }
</style>
</head>

<body>

<video autoplay muted loop playsinline preload="auto" id="vid">
  <source src="rickroll.mp4" type="video/mp4">
</video>

<script>
const v = document.getElementById("vid");

// próba “odmutowania” jeśli user już kiedyś kliknął stronę
document.addEventListener("click", () => {
  v.muted = false;
  v.volume = 1.0;
  v.play();
}, { once: true });
</script>

</body>
</html>
